<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.box{max-width:850px;margin:auto;background:#fff;padding:24px;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
input,select,button{width:100%;padding:12px;margin:8px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:8px}
button{background:#0066cc;color:#fff;border:none}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{border:1px solid #ddd;padding:10px} th{background:#f4f4f4}
</style></head>
<body><div class="box">
<h2>Kalkulator Modular LED</h2>
<select id="sel"><option value='320x160'>320×160</option><option value='320x180'>320×180</option></select>
<select id="pitch"><option value="1.25">P1.2</option><option value="2">P2</option><option value="2.5">P2.5</option><option value="4">P4</option></select>
<input id="w" placeholder="Lebar Screen (mm)">
<input id="h" placeholder="Tinggi Screen (mm)">
<button onclick="hitung()">Hitung</button>

<table id="tbl" style="display:none">
<tr><th>Parameter</th><th>Hasil</th></tr>
<tr><td>Jumlah Module</td><td id="j"></td></tr>
<tr><td>Total Module</td><td id="t"></td></tr>
<tr><td>Resolusi Screen</td><td id="r"></td></tr>
<tr><td>Ukuran Inch</td><td id="i"></td></tr>
<tr><td>Video Processor</td><td id="vp"></td></tr>
</table></div>

<script>
function hitung(){
 let s=document.getElementById('sel').value.split('x');
 let x=Math.floor(+w.value/+s[0]), y=Math.floor(+h.value/+s[1]);
 let rx=Math.floor(+w.value/+pitch.value), ry=Math.floor(+h.value/+pitch.value);
 let pix=rx*ry;
 j.innerHTML=x+' × '+y;
 t.innerHTML=(x*y)+' pcs';
 r.innerHTML=rx+' × '+ry;
 i.innerHTML=(Math.sqrt(w.value*w.value+h.value*h.value)/25.4).toFixed(1)+' inch';
 let proc='H2 / MX Series';
 if(pix<=2600000) proc='TU15 Pro / VX400';
 else if(pix<=3900000) proc='TU20 Pro / VX600';
 else if(pix<=6500000) proc='VX1000';
 else if(pix<=13000000) proc='TU40 Pro / 2×VX1000';
 vp.innerHTML=proc;
 tbl.style.display='table';
}
</script></body></html>
